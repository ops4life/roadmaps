// ── HOOKS ─────────────────────────────────────────────────────────────
function useStored(key, init) {
  const [val, setVal] = useState(() => {
    try { const raw = localStorage.getItem(key); return raw === null ? init : JSON.parse(raw); }
    catch { return init; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key, val]);
  return [val, setVal];
}

function useTweaks(defaults) {
  const [values, setValues] = useState(() => {
    try {
      const raw = localStorage.getItem('ops4life:tweaks');
      return raw ? { ...defaults, ...JSON.parse(raw) } : defaults;
    } catch { return defaults; }
  });
  const setTweak = useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues(prev => {
      const next = { ...prev, ...edits };
      try { localStorage.setItem('ops4life:tweaks', JSON.stringify(next)); } catch {}
      return next;
    });
  }, []);
  return [values, setTweak];
}

function Btn({ children, variant="primary", size="md", onClick, style, disabled, ...rest }) {
  const sizes = { sm:{h:30,px:11,fs:11.5}, md:{h:38,px:16,fs:12.5}, lg:{h:48,px:22,fs:14} };
  const s = sizes[size];
  const variants = {
    primary:   { bg:"var(--ink)",      color:"var(--bg)" },
    secondary: { bg:"var(--bg-2)",     color:"var(--ink)" },
    accent:    { bg:"var(--c-yellow)", color:"var(--ink)" },
    ghost:     { bg:"transparent",     color:"var(--ink)" },
  };
  const v = variants[variant] || variants.primary;
  return (
    <button onClick={onClick} disabled={disabled} {...rest}
      className="brut-sm brut-hover brut-press"
      style={{
        appearance:"none", cursor:disabled?"not-allowed":"pointer",
        background:v.bg, color:v.color,
        height:s.h, padding:`0 ${s.px}px`,
        fontSize:s.fs, fontWeight:700, fontFamily:"inherit",
        textTransform:"uppercase", letterSpacing:".06em",
        display:"inline-flex", alignItems:"center", gap:8,
        opacity:disabled?.5:1,
        ...style,
      }}
    >{children}</button>
  );
}

function TrackSwitcher({ track, onTrackChange, onShowPicker }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, [open]);

  return (
    <div ref={ref} style={{position:"relative"}}>
      <button onClick={() => setOpen(o => !o)} className="brut-sm brut-hover brut-press" style={{
        appearance:"none", cursor:"pointer", fontFamily:"inherit",
        display:"inline-flex", alignItems:"center", gap:9,
        height:36, padding:"0 11px",
        background:"var(--bg-2)", color:"var(--ink)", borderWidth:"1.5px",
        fontSize:12, fontWeight:700, letterSpacing:".05em", textTransform:"uppercase",
      }}>
        <span style={{ width:10, height:10, background:track.accent, border:"1.5px solid var(--ink)" }} />
        <span>{track.title}</span>
        <Icon.Chevron style={{transform: open ? "rotate(180deg)" : "none", transition:"transform .12s ease"}} />

        <div className="brut" style={{
          position:"absolute", top:"calc(100% + 8px)", left:0, zIndex:40,
          minWidth:240, background:"var(--bg-2)", padding:6,
          display:"flex", flexDirection:"column", gap:2,
        }}>
          {TRACKS.map(t => {
            const active = t.id === track.id;
            return (
              <button key={t.id}
                onClick={() => { onTrackChange(t.id); setOpen(false); }}
                style={{
                  appearance:"none", cursor:"pointer", fontFamily:"inherit",
                  display:"flex", alignItems:"center", gap:11,
                  padding:"9px 10px", border:"none",
                  background: active ? "var(--ink)" : "transparent",
                  color: active ? "var(--bg)" : "var(--ink)",

                onMouseLeave={e => { if (!active) e.currentTarget.style.background="transparent"; }}>
                <span style={{ width:12, height:12, background:t.accent, border:"1.5px solid " + (active ? "var(--bg)" : "var(--ink)"), flex:"none" }} />
                <span style={{display:"flex", flexDirection:"column", gap:2, minWidth:0, flex:1}}>

function Board({ track, progress, query, onOpen }) {
  const wrapRef = useRef(null);
  const headerRefs = useRef({});
  const [paths, setPaths] = useState([]);

  const draw = useCallback(() => {
    if (!wrapRef.current) return;
    const wrap = wrapRef.current.getBoundingClientRect();
    const sections = track.sections;
    const newPaths = [];
    for (let i = 0; i < sections.length - 1; i++) {
      const a = headerRefs.current[sections[i].id];
      const b = headerRefs.current[sections[i+1].id];
      if (!a || !b) continue;
      const ar = a.getBoundingClientRect();
      const br = b.getBoundingClientRect();
      const x1 = ar.right - wrap.left;
      const y1 = ar.top + ar.height/2 - wrap.top;
      const x2 = br.left - wrap.left;
      const y2 = br.top + br.height/2 - wrap.top;
      const dx = (x2 - x1) * 0.5;
      newPaths.push({ d:`M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`, color: sections[i+1].color });
    }
    setPaths(newPaths);
  }, [track]);

  useEffect(() => {
    draw();
    const ro = new ResizeObserver(draw);
    if (wrapRef.current) ro.observe(wrapRef.current);
    window.addEventListener("resize", draw);
    return () => { ro.disconnect(); window.removeEventListener("resize", draw); };
  }, [draw]);

  useEffect(() => { const id = setTimeout(draw, 50); return () => clearTimeout(id); }, [track.id, draw]);

  return (
    <div ref={wrapRef} style={{position:"relative"}}>
      <svg style={{ position:"absolute", inset:0, width:"100%", height:"100%", pointerEvents:"none", overflow:"visible" }}>
        <defs>
          <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M0 0 L10 5 L0 10 z" fill="var(--ink)" />
          </marker>
        </defs>
        {paths.map((p, i) => (
          <path key={i} d={p.d} fill="none" stroke="var(--ink)" strokeWidth="2" markerEnd="url(#arrow)" strokeLinecap="round" />
        ))}
      </svg>
      <div style={{ display:"grid", gridTemplateColumns:`repeat(${track.sections.length}, minmax(250px, 1fr))`, gap:"var(--gap-section)", alignItems:"start" }}>
        {track.sections.map(s => (
          <SectionColumn key={s.id}
            section={s} progress={progress} query={query} onOpen={onOpen}
            headerRef={el => { headerRefs.current[s.id] = el; }} />
        ))}
      </div>
    </div>
  );
}

            <div style={{display:"flex", flexDirection:"column", gap:"var(--gap-node)"}}>
              {s.items.map(item => {
                const faded = query && !item.label.toLowerCase().includes(query.toLowerCase())
                                  && !(item.tools||[]).join(" ").toLowerCase().includes(query.toLowerCase());
                return <NodeCard key={item.id} item={item}
                  status={statusOf(progress, item.id)} color={s.color}
                  faded={faded} onOpen={onOpen} />;
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── DETAIL SECTION HELPER ─────────────────────────────────────────────
function Section({ label, children }) {
  return (
    <div style={{marginBottom:22}}>
      <div style={{ fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:".08em", marginBottom:10, color:"var(--ink-3)" }}>{label}</div>
      {children}
    </div>
  );
}

// ── DRAWER ────────────────────────────────────────────────────────────
function Drawer({ open, item, section, status, onClose, onMark }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    if (open) document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, [open, onClose]);

  if (!open || !item) return null;
  return (
    <>
      <div onClick={onClose} style={{ position:"fixed", inset:0, zIndex:50, background:"rgba(0,0,0,.45)", animation:"fade .15s ease" }} />
      <aside style={{
        position:"fixed", right:0, top:0, height:"100%", width:"min(440px, 100vw)",
        background:"var(--bg-2)", borderLeft:"2px solid var(--ink)",
        boxShadow:"-6px 0 0 var(--ink)", zIndex:51,
        display:"flex", flexDirection:"column",
        animation:"slide .2s ease",
      }} className="drawer-aside">
        <div style={{ padding:"16px 20px", borderBottom:"2px solid var(--ink)", background:section?.color || "var(--bg-3)", display:"flex", alignItems:"center", gap:10 }}>
          <Tag>{section?.title || "NODE"}</Tag>
          <Tag color={item.type==="alt" ? "var(--bg-2)" : "var(--c-yellow)"}>{item.type==="alt" ? "ALTERNATIVE" : "RECOMMENDED"}</Tag>
          <span style={{flex:1}} />
          <button onClick={onClose} className="brut-sm brut-hover brut-press" style={{ appearance:"none", cursor:"pointer", width:32, height:32, display:"grid", placeItems:"center", background:"var(--bg-2)" }}>
            <Icon.Close />
          </button>
        </div>

        <div style={{padding:"22px 22px 28px", overflowY:"auto", flex:1}}>
          <h3 className="display" style={{margin:"0 0 14px", fontSize:42, lineHeight:.92, letterSpacing:"-.02em"}}>
            {item.label}<span style={{color:"var(--accent)"}}>.</span>
          </h3>
          <p style={{margin:"0 0 22px", fontSize:14, color:"var(--ink-2)", lineHeight:1.55}}>
            A foundational node in the {section?.title.split("·")[1]?.trim() || ""} section.
            Hands-on with these concepts will give you the muscle memory the rest of the track depends on.
          </p>

          {item.concepts?.length > 0 && (
            <Section label="CORE CONCEPTS">
              <div style={{display:"flex", flexWrap:"wrap", gap:6}}>
                {item.concepts.map(c => <Tag key={c} color="var(--bg-3)">{c}</Tag>)}
              </div>
            </Section>
          )}

          {item.tools?.length > 0 && (
            <Section label="TOOLS">
              <div style={{display:"flex", flexWrap:"wrap", gap:6}}>
                {item.tools.map(c => <Tag key={c} color="var(--c-pink)">{c}</Tag>)}
              </div>
            </Section>
          )}

          <Section label="RESOURCES">
            <div style={{display:"flex", flexDirection:"column", gap:8}}>
              {[
                { kind:"docs",    label:"Official documentation" },
                { kind:"article", label:"A grounded long-form intro" },
                { kind:"video",   label:"60-min walkthrough on YouTube" },
              ].map((r, i) => (
                <a key={i} href="#" onClick={e => e.preventDefault()}
                  className="brut-sm brut-hover brut-press"
                  style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 12px", background:"var(--bg-2)", fontSize:13 }}>
                  <Tag style={{minWidth:54, justifyContent:"center"}}>{r.kind.toUpperCase()}</Tag>
                  <span style={{flex:1}}>{r.label}</span>
                  <Icon.Ext />
                </a>
              ))}
            </div>
          </Section>

          <div className="brut-sm" style={{ padding:"14px 16px", background:"var(--c-yellow)", display:"flex", alignItems:"flex-start", gap:10 }}>
            <Icon.Bulb />
            <div style={{fontSize:13, lineHeight:1.5}}>
              <strong style={{textTransform:"uppercase", letterSpacing:".06em", fontSize:11}}>Tip · </strong>
              Don't try to learn this in isolation. Pick a node from the previous section and build something tiny that touches both.
            </div>
          </div>
        </div>

        <div style={{ padding:"14px 18px", borderTop:"2px solid var(--ink)", background:"var(--bg-2)", display:"flex", gap:10 }}>
          <Btn variant={status==="learning" ? "accent" : "secondary"} size="md"
            onClick={() => onMark(item.id, "learning")}
            style={{flex:1, justifyContent:"center"}}>
            {status==="learning" ? "Learning ✓" : "Mark as learning"}
          </Btn>
          <Btn variant={status==="done" ? "primary" : "secondary"} size="md"
            onClick={() => onMark(item.id, "done")}
            style={{ flex:1, justifyContent:"center", background: status==="done" ? "var(--done)" : undefined, color: status==="done" ? "var(--ink)" : undefined }}>
            {status==="done" ? "Done ✓" : "Mark as done"}
          </Btn>
        </div>
      </aside>
      <style>{`
        @keyframes fade { from{opacity:0} to{opacity:1} }
        @keyframes slide { from{transform:translateX(20px); opacity:0} to{transform:translateX(0); opacity:1} }
        @media (max-width: 640px){
          .drawer-aside{ width:100% !important; top:auto !important; bottom:0 !important; height:70vh !important; border-left:none !important; border-top:2px solid var(--ink) !important; box-shadow:0 -6px 0 var(--ink) !important; animation: slideUp .2s ease !important; }
        }
        @keyframes slideUp { from{transform:translateY(20px); opacity:0} to{transform:translateY(0); opacity:1} }
      `}</style>
    </>
  );
}

// ── NEWSLETTER ────────────────────────────────────────────────────────
const LIST_UUID = "00a8f2c1-3ad4-422d-9ac4-fc70b1f26fc8";

function Newsletter() {
  const [email, setEmail] = useState("");
  const [status, setStatus] = useState(null);
  const [loading, setLoading] = useState(false);

  const subscribe = async () => {
    const v = email.trim();
    if (!v || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) {
      setStatus({ ok:false, msg:"Enter a valid email address." });
      return;
    }
    setLoading(true);
    setStatus(null);
    try {
      const res = await fetch("/api/subscribe", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ email:v, list_uuids:[LIST_UUID] }),
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok) {
        setStatus({ ok:true, msg:"Check your inbox to confirm." });
        setEmail("");
      } else if (res.status === 409) {
        setStatus({ ok:false, msg: data?.error || "Already subscribed." });
      } else {
        setStatus({ ok:false, msg:"Something went wrong. Try again." });
      }
    } catch {
      setStatus({ ok:false, msg:"Could not connect. Try again." });
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{borderTop:"2px solid var(--ink)", padding:"28px 22px", background:"var(--bg-2)"}}>
      <div style={{maxWidth:560}}>
        <div className="display-mid" style={{fontSize:22, marginBottom:6}}>Stay in the loop</div>
        <p style={{fontSize:12, color:"var(--ink-3)", marginBottom:16}}>Get notified when new roadmaps and updates drop.</p>
        <div className="nl-row" style={{display:"flex", gap:8}}>
          <input
            type="email" value={email}
            onChange={e => setEmail(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter") subscribe(); }}
            placeholder="your@email.com"
            className="brut-sm"
            style={{
              flex:1, minWidth:0,
              fontFamily:"inherit", fontSize:12, color:"var(--ink)",
              background:"var(--bg)", padding:"0 12px", height:38,
              border:"1.5px solid var(--ink)", outline:"none",
            }} />
          <Btn onClick={subscribe} disabled={loading} size="md">
            {loading ? "..." : "Subscribe"}
          </Btn>
        </div>
        {status && (
          <div style={{ marginTop:10, fontSize:12, color: status.ok ? "oklch(0.55 0.16 145)" : "oklch(0.55 0.20 25)" }}>
            {status.msg}
          </div>
        )}
      </div>
      <style>{`@media (max-width: 480px){ .nl-row{ flex-direction: column } }`}</style>
    </div>
  );
}

// ── FOOTER ────────────────────────────────────────────────────────────
function Footer() {
  return (
    <footer style={{borderTop:"2px solid var(--ink)", background:"var(--bg-2)"}}>
      <Newsletter />
      <div className="footer-inner" style={{
        maxWidth:1320, margin:"0 auto", padding:"18px 22px",
        borderTop:"1.5px solid var(--ink)",
        display:"flex", alignItems:"center", justifyContent:"space-between", gap:18, flexWrap:"wrap",
      }}>
        <div style={{display:"flex", alignItems:"center", gap:9}}>
          <Icon.Logo />
          <span className="display-mid" style={{fontSize:16, letterSpacing:"-.01em"}}>OPS4LIFE</span>
          <span style={{fontSize:11, color:"var(--ink-3)"}}>· progress lives in your browser</span>
        </div>
        <div style={{display:"flex", gap:14, fontSize:10.5, fontWeight:700, textTransform:"uppercase", letterSpacing:".08em", color:"var(--ink-3)"}}>
          <a href="https://ops4life.com">home</a>
          <a href="https://github.com/ops4life/roadmaps" target="_blank" rel="noopener">github</a>

      </div>
      <style>{`@media (max-width: 480px){ .footer-inner{ padding: 14px 16px !important } }`}</style>

}

// ── APP ───────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = { theme:"light", view:"grid", density:"normal", showHero:true };

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [trackId, setTrackId] = useStored("ops4life:active-track", null);
  const [view, setView] = useState(t.view);
  const [query, setQuery] = useState("");
  const [openItem, setOpenItem] = useState(null);
  const [settingsOpen, setSettingsOpen] = useState(false);

  useEffect(() => { document.documentElement.classList.toggle("dark", t.theme==="dark"); }, [t.theme]);
  useEffect(() => { setView(t.view); }, [t.view]);
  useEffect(() => {
    const root = document.documentElement;
    root.classList.remove("density-compact", "density-spacious");
    if (t.density === "compact") root.classList.add("density-compact");
    if (t.density === "spacious") root.classList.add("density-spacious");
  }, [t.density]);

  useEffect(() => {
    const mq = window.matchMedia("(max-width: 768px)");
    const apply = () => { if (mq.matches) setView("list"); };
    apply();
    mq.addEventListener?.("change", apply);
    return () => mq.removeEventListener?.("change", apply);
  }, []);

  const p0 = useStored(TRACKS[0].storageKey, { learning:{}, done:{} });
  const p1 = useStored(TRACKS[1].storageKey, { learning:{}, done:{} });
  const p2 = useStored(TRACKS[2].storageKey, { learning:{}, done:{} });
  const progressByTrack = {
    [TRACKS[0].id]: p0[0], [TRACKS[1].id]: p1[0], [TRACKS[2].id]: p2[0],
  };
  const setProgressByTrack = {
    [TRACKS[0].id]: p0[1], [TRACKS[1].id]: p1[1], [TRACKS[2].id]: p2[1],
  };

  const track = useMemo(() => trackId ? TRACKS.find(tr => tr.id === trackId) : null, [trackId]);
  const progress = track ? progressByTrack[track.id] : { learning:{}, done:{} };
  const setProgress = track ? setProgressByTrack[track.id] : (() => {});

  const totalCount = track ? track.sections.reduce((a, s) => a + s.items.length, 0) : 0;
  const doneCount = Object.values(progress.done || {}).filter(Boolean).length;
  const percent = totalCount ? Math.round((doneCount / totalCount) * 100) : 0;

  const onMark = (id, kind) => {
    setProgress(p => {
      const next = { learning:{...(p.learning||{})}, done:{...(p.done||{})} };
      if (kind === "done") {
        next.done[id] = !next.done[id];
        if (next.done[id]) next.learning[id] = false;
      } else if (kind === "learning") {
        next.learning[id] = !next.learning[id];
        if (next.learning[id]) next.done[id] = false;
      }
      return next;
    });
  };

  const sectionOf = (item) => track?.sections.find(s => s.items.some(i => i.id === item.id));
  const showPicker = () => { setTrackId(null); setOpenItem(null); setQuery(""); window.scrollTo({top:0}); };
  const choose = (id) => { setTrackId(id); window.scrollTo({top:0}); };

  return (
    <div style={{minHeight:"100vh"}}>
      <Header track={track} onTrackChange={choose} onShowPicker={showPicker}
        query={query} setQuery={setQuery}
        view={view} setView={setView}
        percent={percent}
        onSettings={() => setSettingsOpen(s => !s)} />

      {!track && <TrackPicker onChoose={choose} progressByTrack={progressByTrack} />}

      {track && t.showHero && (
        <Hero track={track} percent={percent} doneCount={doneCount} totalCount={totalCount} />
      )}

      {track && (
        <main className="board-main" style={{
          maxWidth:1320, margin:"0 auto",
          padding:"16px 22px 60px",
          overflowX: view==="grid" ? "auto" : "visible",
        }}>
          {view === "grid"
            ? <Board track={track} progress={progress} query={query} onOpen={setOpenItem} />
            : <ListView track={track} progress={progress} query={query} onOpen={setOpenItem} />}
        </main>
      )}

      <Footer />

      <Drawer
        open={!!openItem}
        item={openItem}
        section={openItem ? sectionOf(openItem) : null}
        status={openItem ? statusOf(progress, openItem.id) : "todo"}
        onClose={() => setOpenItem(null)}
        onMark={onMark} />

      <TweaksPanel open={settingsOpen} onClose={() => setSettingsOpen(false)}>
        <TweakSection label="Appearance" />
        <TweakRadio label="Mode" value={t.theme} options={["light","dark"]}
          onChange={v => setTweak("theme", v)} />
        <TweakRadio label="Density" value={t.density} options={["compact","normal","spacious"]}
          onChange={v => setTweak("density", v)} />
        <TweakSection label="Layout" />
        <TweakRadio label="Default view" value={t.view} options={["grid","list"]}
          onChange={v => setTweak("view", v)} />
        <TweakToggle label="Show hero" value={t.showHero}
          onChange={v => setTweak("showHero", v)} />
        <TweakSection label="Progress" />
        <TweakButton label={track ? "Reset this track" : "Reset all tracks"}
          onClick={() => {
            if (track) setProgress({ learning:{}, done:{} });
            else { p0[1]({learning:{},done:{}}); p1[1]({learning:{},done:{}}); p2[1]({learning:{},done:{}}); }
          }} />
        <TweakButton label="Back to all tracks" onClick={showPicker} />
      </TweaksPanel>

      <style>{`
        @media (max-width: 560px){ .board-main{ padding: 14px 14px 56px !important } }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
