// ── HOOKS ─────────────────────────────────────────────────────────────
function useStored(key, init) {
  const [val, setVal] = useState(() => {
    try { const raw = localStorage.getItem(key); return raw === null ? init : JSON.parse(raw); }
    catch { return init; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key, val]);
  return [val, setVal];
}

// ── PRIMITIVES ────────────────────────────────────────────────────────
function Btn({ children, variant="primary", size="md", onClick, style, disabled, ...rest }) {
  const sizes = { sm:{h:30,px:11,fs:11.5}, md:{h:38,px:16,fs:12.5}, lg:{h:48,px:22,fs:14} };
  const s = sizes[size];
  const variants = {
    primary:   { bg:"var(--ink)",      color:"var(--bg)" },
    secondary: { bg:"var(--bg-2)",     color:"var(--ink)" },
    accent:    { bg:"var(--c-yellow)", color:"var(--ink)" },
    ghost:     { bg:"transparent",     color:"var(--ink)" },
  };
  const v = variants[variant] || variants.primary;
  return (
    <button onClick={onClick} disabled={disabled} {...rest}
      className="brut-sm brut-hover brut-press"
      style={{
        appearance:"none", cursor:disabled?"not-allowed":"pointer",
        background:v.bg, color:v.color,
        height:s.h, padding:`0 ${s.px}px`,
        fontSize:s.fs, fontWeight:700, fontFamily:"inherit",
        textTransform:"uppercase", letterSpacing:".06em",
        display:"inline-flex", alignItems:"center", gap:8,
        opacity:disabled?.5:1,
        ...style,
      }}
    >{children}</button>
  );
}

function Tag({ children, color="var(--bg-3)", style }) {
  return (
    <span style={{
      display:"inline-flex", alignItems:"center", gap:6,
      padding:"3px 7px", border:"1.5px solid var(--ink)",
      background:color, color:"var(--ink)",
      fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:".10em",
      ...style,
    }}>{children}</span>
  );
}

// ── TRACK SWITCHER ────────────────────────────────────────────────────
function TrackSwitcher({ track, onTrackChange, onShowPicker }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, [open]);

  return (
    <div ref={ref} style={{position:"relative"}}>
      <button onClick={() => setOpen(o => !o)} className="brut-sm brut-hover brut-press" style={{
        appearance:"none", cursor:"pointer", fontFamily:"inherit",
        display:"inline-flex", alignItems:"center", gap:9,
        height:36, padding:"0 11px",
        background:"var(--bg-2)", color:"var(--ink)", borderWidth:"1.5px",
        fontSize:12, fontWeight:700, letterSpacing:".05em", textTransform:"uppercase",
      }}>
        <span style={{ width:10, height:10, background:track.accent, border:"1.5px solid var(--ink)" }} />
        <span>{track.title}</span>
        <Icon.Chevron style={{transform: open ? "rotate(180deg)" : "none", transition:"transform .12s ease"}} />
      </button>

      {open && (
        <div className="brut" style={{
          position:"absolute", top:"calc(100% + 8px)", left:0, zIndex:40,
          minWidth:240, background:"var(--bg-2)", padding:6,
          display:"flex", flexDirection:"column", gap:2,
        }}>
          {TRACKS.map(t => {
            const active = t.id === track.id;
            return (
              <button key={t.id}
                onClick={() => { onTrackChange(t.id); setOpen(false); }}
                style={{
                  appearance:"none", cursor:"pointer", fontFamily:"inherit",
                  display:"flex", alignItems:"center", gap:11,
                  padding:"9px 10px", border:"none",
                  background: active ? "var(--ink)" : "transparent",
                  color: active ? "var(--bg)" : "var(--ink)",
                  textAlign:"left",
                }}
                onMouseEnter={e => { if (!active) e.currentTarget.style.background="var(--bg-3)"; }}
                onMouseLeave={e => { if (!active) e.currentTarget.style.background="transparent"; }}>
                <span style={{ width:12, height:12, background:t.accent, border:"1.5px solid " + (active ? "var(--bg)" : "var(--ink)"), flex:"none" }} />
                <span style={{display:"flex", flexDirection:"column", gap:2, minWidth:0, flex:1}}>
                  <span style={{ fontSize:12, fontWeight:700, letterSpacing:".05em", textTransform:"uppercase" }}>{t.title}</span>
                  <span style={{ fontSize:10.5, fontWeight:400, letterSpacing:".02em", color: active ? "var(--bg-3)" : "var(--ink-3)", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{t.tagline}</span>
                </span>
              </button>
            );
          })}
          <div style={{height:1.5, background:"var(--ink)", margin:"6px 4px"}} />
          <button
            onClick={() => { onShowPicker(); setOpen(false); }}
            style={{
              appearance:"none", cursor:"pointer", fontFamily:"inherit",
              display:"flex", alignItems:"center", gap:8,
              padding:"8px 10px", border:"none", background:"transparent",
              color:"var(--ink-2)", textAlign:"left",
              fontSize:11.5, fontWeight:700, letterSpacing:".06em", textTransform:"uppercase",
            }}
            onMouseEnter={e => { e.currentTarget.style.background="var(--bg-3)"; e.currentTarget.style.color="var(--ink)"; }}
            onMouseLeave={e => { e.currentTarget.style.background="transparent"; e.currentTarget.style.color="var(--ink-2)"; }}>
            <Icon.Back />
            <span>All tracks</span>
          </button>
        </div>
      )}
    </div>
  );
}

            <div className="header-progress" style={{
              display:"flex", alignItems:"center", gap:9,
              padding:"6px 10px", border:"1.5px solid var(--ink)",
              background:"var(--c-lime)", color:"var(--ink)",
              fontSize:11, fontWeight:700, letterSpacing:".05em",

                <div style={{width:`${percent}%`, height:"100%", background:"var(--ink)"}} />
              </div>
            </div>
          </div>
        )}

      </div>
      <style>{`
        @media (max-width: 768px){
          .header-inner{ padding: 10px 16px !important; gap:8px !important }
          .header-search input{ width: 90px !important }
        }
        @media (max-width: 560px){
          .header-controls{ width:100%; justify-content: space-between }
          .header-search{ flex:1 }
          .header-search input{ width:100% !important }

function Board({ track, progress, query, onOpen }) {
  const wrapRef = useRef(null);
  const headerRefs = useRef({});
  const [paths, setPaths] = useState([]);

  const draw = useCallback(() => {
    if (!wrapRef.current) return;
    const wrap = wrapRef.current.getBoundingClientRect();
    const sections = track.sections;
    const newPaths = [];
    for (let i = 0; i < sections.length - 1; i++) {
      const a = headerRefs.current[sections[i].id];
      const b = headerRefs.current[sections[i+1].id];
      if (!a || !b) continue;
      const ar = a.getBoundingClientRect();
      const br = b.getBoundingClientRect();
      const x1 = ar.right - wrap.left;
      const y1 = ar.top + ar.height/2 - wrap.top;
      const x2 = br.left - wrap.left;
      const y2 = br.top + br.height/2 - wrap.top;
      const dx = (x2 - x1) * 0.5;
      newPaths.push({ d:`M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`, color: sections[i+1].color });
    }
    setPaths(newPaths);
  }, [track]);

  useEffect(() => {
    draw();
    const ro = new ResizeObserver(draw);
    if (wrapRef.current) ro.observe(wrapRef.current);
    window.addEventListener("resize", draw);
    return () => { ro.disconnect(); window.removeEventListener("resize", draw); };
  }, [draw]);

  useEffect(() => { const id = setTimeout(draw, 50); return () => clearTimeout(id); }, [track.id, draw]);

  return (
    <div ref={wrapRef} style={{position:"relative"}}>
      <svg style={{ position:"absolute", inset:0, width:"100%", height:"100%", pointerEvents:"none", overflow:"visible" }}>
        <defs>
          <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M0 0 L10 5 L0 10 z" fill="var(--ink)" />
          </marker>
        </defs>
        {paths.map((p, i) => (
          <path key={i} d={p.d} fill="none" stroke="var(--ink)" strokeWidth="2" markerEnd="url(#arrow)" strokeLinecap="round" />
        ))}
      </svg>
      <div style={{ display:"grid", gridTemplateColumns:`repeat(${track.sections.length}, minmax(250px, 1fr))`, gap:"var(--gap-section)", alignItems:"start" }}>
        {track.sections.map(s => (
          <SectionColumn key={s.id}
            section={s} progress={progress} query={query} onOpen={onOpen}
            headerRef={el => { headerRefs.current[s.id] = el; }} />
        ))}
      </div>
    </div>
  );
}

// ── NEWSLETTER ────────────────────────────────────────────────────────
const LIST_UUID = "00a8f2c1-3ad4-422d-9ac4-fc70b1f26fc8";

function Newsletter() {
  const [email, setEmail] = useState("");
  const [status, setStatus] = useState(null);
  const [loading, setLoading] = useState(false);

  const subscribe = async () => {
    const v = email.trim();
    if (!v || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) {
      setStatus({ ok:false, msg:"Enter a valid email address." });
      return;
    }
    setLoading(true);
    setStatus(null);
    try {
      const res = await fetch("/api/subscribe", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ email:v, list_uuids:[LIST_UUID] }),
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok) {
        setStatus({ ok:true, msg:"Check your inbox to confirm." });
        setEmail("");
      } else if (res.status === 409) {
        setStatus({ ok:false, msg: data?.error || "Already subscribed." });
      } else {
        setStatus({ ok:false, msg:"Something went wrong. Try again." });
      }
    } catch {
      setStatus({ ok:false, msg:"Could not connect. Try again." });
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{borderTop:"2px solid var(--ink)", padding:"28px 22px", background:"var(--bg-2)"}}>
      <div style={{maxWidth:560}}>
        <div className="display-mid" style={{fontSize:22, marginBottom:6}}>Stay in the loop</div>
        <p style={{fontSize:12, color:"var(--ink-3)", marginBottom:16}}>Get notified when new roadmaps and updates drop.</p>
        <div className="nl-row" style={{display:"flex", gap:8}}>
          <input
            type="email" value={email}
            onChange={e => setEmail(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter") subscribe(); }}
            placeholder="your@email.com"
            className="brut-sm"
            style={{
              flex:1, minWidth:0,
              fontFamily:"inherit", fontSize:12, color:"var(--ink)",
              background:"var(--bg)", padding:"0 12px", height:38,
              border:"1.5px solid var(--ink)", outline:"none",
            }} />
          <Btn onClick={subscribe} disabled={loading} size="md">
            {loading ? "..." : "Subscribe"}
          </Btn>
        </div>
        {status && (
          <div style={{ marginTop:10, fontSize:12, color: status.ok ? "oklch(0.55 0.16 145)" : "oklch(0.55 0.20 25)" }}>
            {status.msg}
          </div>
        )}
      </div>
      <style>{`@media (max-width: 480px){ .nl-row{ flex-direction: column } }`}</style>
    </div>
  );
}

                  { icon:"🐛", label:"Bug Report", sub:"Something is broken or wrong", url:"https://github.com/ops4life/spark/issues/new?template=bug.yml&labels=roadmap,bug" },
                  { icon:"💡", label:"Idea",        sub:"Suggest a new capability",    url:"https://github.com/ops4life/spark/issues/new?template=idea.yml&labels=roadmap,idea" },
                  { icon:"💬", label:"Discussions", sub:"Thoughts or suggestions",     url:"https://github.com/ops4life/spark/discussions" },
                  { icon:"❓", label:"Question",    sub:"Something else entirely",     url:"https://github.com/ops4life/spark/issues/new?template=question.yml&labels=roadmap,question" },
                ].map(({ icon, label, sub, url }) => (
                  <a key={label} href={url} target="_blank" rel="noopener noreferrer" style={{
                    display:"flex", flexDirection:"column", gap:4,
                    padding:"0.85rem", background:"var(--bg-3)",
                    border:"2px solid var(--ink)", textDecoration:"none", color:"inherit",
                    transition:"transform .12s, box-shadow .12s",
                  }} className="brut-hover">
                    <span style={{fontSize:"1.4rem"}}>{icon}</span>
                    <span style={{fontWeight:700, fontSize:"0.75rem", textTransform:"uppercase", letterSpacing:"0.05em"}}>{label}</span>
                    <span style={{fontSize:"0.65rem", color:"var(--ink-3)"}}>{sub}</span>
                  </a>
                ))}
              </div>
            </div>
          </div>
        </>
      )}
    </>
  );
}

// ── APP ───────────────────────────────────────────────────────────────
function App() {
  const [trackId, setTrackId] = useStored("ops4life:active-track", null);
  const [view, setView] = useState("grid");
  const [query, setQuery] = useState("");
  const [openItem, setOpenItem] = useState(null);

  useEffect(() => {
    const mq = window.matchMedia("(max-width: 768px)");
    const apply = () => { if (mq.matches) setView("list"); };
    apply();
    mq.addEventListener?.("change", apply);
    return () => mq.removeEventListener?.("change", apply);
  }, []);

  const p0 = useStored(TRACKS[0].storageKey, { learning:{}, done:{} });
  const p1 = useStored(TRACKS[1].storageKey, { learning:{}, done:{} });
  const p2 = useStored(TRACKS[2].storageKey, { learning:{}, done:{} });
  const p3 = useStored(TRACKS[3].storageKey, { learning:{}, done:{} });
  const progressByTrack = {
    [TRACKS[0].id]: p0[0], [TRACKS[1].id]: p1[0], [TRACKS[2].id]: p2[0], [TRACKS[3].id]: p3[0],
  };
  const setProgressByTrack = {
    [TRACKS[0].id]: p0[1], [TRACKS[1].id]: p1[1], [TRACKS[2].id]: p2[1], [TRACKS[3].id]: p3[1],
  };

  const track = useMemo(() => trackId ? TRACKS.find(tr => tr.id === trackId) : null, [trackId]);
  const progress = track ? progressByTrack[track.id] : { learning:{}, done:{} };
  const setProgress = track ? setProgressByTrack[track.id] : (() => {});

  const totalCount = track ? track.sections.reduce((a, s) => a + s.items.length, 0) : 0;
  const doneCount = Object.values(progress.done || {}).filter(Boolean).length;
  const percent = totalCount ? Math.round((doneCount / totalCount) * 100) : 0;

  const onMark = (id, kind) => {
    setProgress(p => {
      const next = { learning:{...(p.learning||{})}, done:{...(p.done||{})} };
      if (kind === "done") {
        next.done[id] = !next.done[id];
        if (next.done[id]) next.learning[id] = false;
      } else if (kind === "learning") {
        next.learning[id] = !next.learning[id];
        if (next.learning[id]) next.done[id] = false;
      }
      return next;
    });
  };

  const sectionOf = (item) => track?.sections.find(s => s.items.some(i => i.id === item.id));
  const showPicker = () => { setTrackId(null); setOpenItem(null); setQuery(""); window.scrollTo({top:0}); };
  const choose = (id) => { setTrackId(id); window.scrollTo({top:0}); };

  return (
    <div style={{minHeight:"100vh"}}>
      <Header track={track} onTrackChange={choose} onShowPicker={showPicker}
        query={query} setQuery={setQuery}
        view={view} setView={setView}
        percent={percent} />

      {!track && <TrackPicker onChoose={choose} progressByTrack={progressByTrack} />}

      {track && (
        <Hero track={track} percent={percent} doneCount={doneCount} totalCount={totalCount} />
      )}

      {track && (
        <main className="board-main" style={{
          maxWidth:1320, margin:"0 auto",
          padding:"16px 22px 60px",
          overflowX: view==="grid" ? "auto" : "visible",
        }}>
          {view === "grid"
            ? <Board track={track} progress={progress} query={query} onOpen={setOpenItem} />
            : <ListView track={track} progress={progress} query={query} onOpen={setOpenItem} />}
        </main>
      )}

      <Footer />

      <Drawer
        open={!!openItem}
        item={openItem}
        section={openItem ? sectionOf(openItem) : null}
        status={openItem ? statusOf(progress, openItem.id) : "todo"}
        onClose={() => setOpenItem(null)}
        onMark={onMark} />

      <Feedback />

      <style>{`
        @media (max-width: 560px){ .board-main{ padding: 14px 14px 56px !important } }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
