<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!--
    Isometric box — matches 3d-view.png
    Apex:      (50,  4)
    Left:      ( 4, 27)
    Right:     (96, 27)
    Mid:       (50, 50)
    Bot-left:  ( 4, 73)
    Bot-right: (96, 73)
    Bottom:    (50, 96)
  -->

  <!-- Top face (white) -->
  <polygon points="50,4 96,27 50,50 4,27"
    fill="white" stroke="#3565c5" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- Left face (cyan) -->
  <polygon points="4,27 50,50 50,96 4,73"
    fill="#00cfff" stroke="#3565c5" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- Right face (cyan) -->
  <polygon points="96,27 50,50 50,96 96,73"
    fill="#00cfff" stroke="#3565c5" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- Lid detail — bent line on top face suggesting an open box -->
  <polyline points="44,14 22,28 36,38"
    fill="none" stroke="#3565c5" stroke-width="2.8"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
